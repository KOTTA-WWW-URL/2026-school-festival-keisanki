<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>おかし計算機</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111;
  --panel: #1c1c1c;
  --card: #252525;
  --border: #333;
  --acc1: #c8f000;
  --acc2: #ff4400;
  --acc3: #00aaff;
  --text: #e8e8e8;
  --muted: #555;
  --mono: 'Share Tech Mono', monospace;
  --sans: 'Barlow Condensed', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg);
  background-image: repeating-linear-gradient(0deg, transparent, transparent 23px, rgba(255,255,255,0.02) 24px);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 12px 40px;
  overflow-x: hidden;
  color: var(--text);
}

/* header */
.header {
  width: 100%; max-width: 400px;
  border: 1px solid var(--border); border-bottom: none;
  background: var(--panel);
  padding: 8px 14px 6px;
  display: flex; align-items: baseline; gap: 10px;
}
.header-tag { font-family: var(--mono); font-size: 0.58rem; color: var(--acc1); letter-spacing: 0.15em; }
h1 { font-family: var(--sans); font-size: 1.1rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text); }

/* shell */
.shell {
  width: 100%; max-width: 400px;
  border: 1px solid var(--border);
  background: var(--panel);
  padding: 14px 14px 12px;
}
.sec-label { font-family: var(--mono); font-size: 0.56rem; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 8px; }

/* input row */
.input-row {
  display: flex; align-items: center; justify-content: center;
  gap: 4px; margin-bottom: 12px; flex-wrap: nowrap;
}
.box {
  width: 48px; height: 52px;
  background: #0a0a0a;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 1.2rem; color: var(--acc1);
  cursor: pointer; position: relative; user-select: none; flex-shrink: 0;
  transition: border-color 0.1s, box-shadow 0.1s;
}
.box.active {
  border-color: var(--acc1);
  box-shadow: 0 0 6px rgba(200,240,0,0.4), inset 0 0 8px rgba(200,240,0,0.05);
}
.box .cursor {
  display: none; width: 2px; height: 60%;
  background: var(--acc1); animation: blink 1s step-end infinite;
  position: absolute; right: 7px; top: 20%;
}
.box.active.empty .cursor { display: block; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.plus { font-family: var(--mono); font-size: 0.9rem; color: var(--muted); flex-shrink: 0; }

/* calc button */
.btn-calc {
  display: block; width: 100%; padding: 13px;
  background: var(--acc1); color: #111;
  border: none;
  font-family: var(--sans); font-size: 0.95rem; font-weight: 700;
  letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer;
  clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%);
  transition: filter 0.1s;
}
.btn-calc:active { filter: brightness(0.82); }

/* result */
.result-area {
  width: 100%; max-width: 400px;
  border: 1px solid var(--border); border-top: none;
  background: #0a0a0a;
  padding: 14px 14px 12px;
  display: none;
  animation: slideDown 0.18s ease both;
}
.result-area.show { display: block; }
@keyframes slideDown { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }

.r-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; }
.r-label { font-family: var(--mono); font-size: 0.56rem; color: var(--muted); letter-spacing: 0.2em; white-space: nowrap; }
.r-num { font-family: var(--mono); font-size: 2.8rem; line-height: 1; color: var(--acc1); }
.r-divider { height: 1px; background: var(--border); margin-bottom: 10px; }
.r-snack-row { display: flex; align-items: center; gap: 10px; }
.r-tag { font-family: var(--mono); font-size: 0.56rem; color: var(--muted); letter-spacing: 0.15em; white-space: nowrap; }
.r-snack { font-family: var(--sans); font-size: 1.2rem; font-weight: 700; letter-spacing: 0.05em; }
.r-emoji { font-size: 1.3rem; }

.theme-nashi  .r-snack { color: var(--muted); }
.theme-ame    .r-snack { color: #ffd700; } .theme-ame    .r-num { color: #ffd700; }
.theme-umaibo .r-snack { color: var(--acc2); } .theme-umaibo .r-num { color: var(--acc2); }
.theme-buta   .r-snack { color: var(--acc3); } .theme-buta   .r-num { color: var(--acc3); }

/* reset button */
.btn-reset {
  display: block; width: 100%; max-width: 400px;
  padding: 9px;
  background: transparent; color: var(--muted);
  border: 1px solid var(--border); border-top: none;
  font-family: var(--mono); font-size: 0.68rem;
  letter-spacing: 0.25em; text-transform: uppercase; cursor: pointer;
  transition: color 0.1s, border-color 0.1s, background 0.1s;
}
.btn-reset:hover { color: var(--acc2); border-color: var(--acc2); }
.btn-reset:active { background: rgba(255,68,0,0.07); }

/* numpad */
.numpad-shell {
  width: 100%; max-width: 400px;
  border: 1px solid var(--border);
  background: var(--panel);
  padding: 12px;
}
.numpad-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 5px; margin-bottom: 5px;
}
.nk {
  background: var(--card); color: var(--text);
  border: 1px solid var(--border);
  font-family: var(--mono); font-size: 1.25rem;
  padding: 14px 0; cursor: pointer; user-select: none;
  transition: background 0.08s, color 0.08s;
}
.nk:active, .nk.pressed { background: #2e2e2e; color: var(--acc1); }
.nk.zero { grid-column: span 2; }
.nk.del { color: var(--acc2); }
.nk.del:active, .nk.del.pressed { background: #200a00; }
.nav-row { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.nk-nav {
  background: #0d0d0d; color: var(--muted);
  border: 1px solid var(--border);
  font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.08em;
  padding: 9px 0; cursor: pointer; user-select: none;
  transition: color 0.08s, border-color 0.08s;
}
.nk-nav:active, .nk-nav.pressed { color: var(--acc1); border-color: var(--acc1); background: rgba(200,240,0,0.04); }

/* footer */
.footer-bar {
  width: 100%; max-width: 400px;
  border: 1px solid var(--border); border-top: none;
  background: #0d0d0d;
  padding: 4px 14px;
  display: flex; justify-content: space-between;
}
.footer-bar span { font-family: var(--mono); font-size: 0.5rem; color: #2a2a2a; letter-spacing: 0.1em; }
</style>
</head>
<body>

<div class="header">
  <span class="header-tag">SYS:OKASHI</span>
  <h1>おかし計算機</h1>
</div>

<div class="shell">
  <div class="sec-label">// INPUT VALUES</div>
  <div class="input-row" id="inputRow"></div>
  <div class="sec-label">// EXECUTE</div>
  <button class="btn-calc" onclick="calculate()">▶ CALCULATE</button>
</div>

<div class="result-area" id="resultArea">
  <div class="r-row">
    <span class="r-label">TOTAL&nbsp;=</span>
    <span class="r-num" id="rNum">0</span>
  </div>
  <div class="r-divider"></div>
  <div class="r-snack-row">
    <span class="r-emoji" id="rEmoji"></span>
    <span class="r-tag">OUTPUT&gt;</span>
    <span class="r-snack" id="rSnack"></span>
  </div>
</div>

<button class="btn-reset" id="btnReset" onclick="resetAll()" style="display:none">⟳ RESET</button>

<div class="numpad-shell">
  <div class="sec-label">// KEYPAD</div>
  <div class="numpad-grid" id="numpadGrid"></div>
  <div class="nav-row">
    <button class="nk-nav" id="btnPrev" onclick="moveBox(-1)">◀ PREV</button>
    <button class="nk-nav" id="btnNext" onclick="moveBox(1)">NEXT ▶</button>
  </div>
</div>

<div class="footer-bar">
  <span>VER 2.0</span>
  <span>OKASHI-CALC</span>
  <span>READY</span>
</div>

<script>
const NUM = 6;
const values = Array(NUM).fill('');
let activeIdx = 0;

const row = document.getElementById('inputRow');
for (let i = 0; i < NUM; i++) {
  if (i > 0) {
    const pl = document.createElement('span');
    pl.className = 'plus'; pl.textContent = '+';
    row.appendChild(pl);
  }
  const b = document.createElement('div');
  b.className = 'box empty'; b.dataset.idx = i;
  b.innerHTML = `<span class="val"></span><span class="cursor"></span>`;
  b.addEventListener('click', () => setActive(i));
  row.appendChild(b);
}

function getBox(i) { return row.querySelector(`.box[data-idx="${i}"]`); }

function setActive(i) {
  document.querySelectorAll('.box').forEach(b => b.classList.remove('active'));
  activeIdx = i;
  getBox(i).classList.add('active');
}

function renderBox(i) {
  const b = getBox(i), v = values[i];
  b.querySelector('.val').textContent = v;
  b.classList.toggle('empty', v === '');
}

setActive(0);

// numpad
const grid = document.getElementById('numpadGrid');
['7','8','9','4','5','6','1','2','3'].forEach(k => {
  const btn = document.createElement('button');
  btn.className = 'nk'; btn.textContent = k;
  btn.addEventListener('pointerdown', e => { e.preventDefault(); pressKey(k, btn); });
  grid.appendChild(btn);
});
const btn0 = document.createElement('button');
btn0.className = 'nk zero'; btn0.textContent = '0';
btn0.addEventListener('pointerdown', e => { e.preventDefault(); pressKey('0', btn0); });
grid.appendChild(btn0);

const btnDel = document.createElement('button');
btnDel.className = 'nk del'; btnDel.textContent = '⌫';
btnDel.addEventListener('pointerdown', e => { e.preventDefault(); pressKey('del', btnDel); });
grid.appendChild(btnDel);

function pressKey(k, btn) {
  btn.classList.add('pressed');
  setTimeout(() => btn.classList.remove('pressed'), 120);
  if (k === 'del') {
    values[activeIdx] = values[activeIdx].slice(0, -1);
  } else {
    const cur = values[activeIdx];
    if (cur.length >= 4) return;
    if (cur === '0') return;
    values[activeIdx] = cur + k;
  }
  renderBox(activeIdx);
}

function moveBox(dir) {
  const btn = dir < 0 ? document.getElementById('btnPrev') : document.getElementById('btnNext');
  btn.classList.add('pressed');
  setTimeout(() => btn.classList.remove('pressed'), 120);
  setActive((activeIdx + dir + NUM) % NUM);
}

document.addEventListener('keydown', e => {
  const dummy = { classList: { add:()=>{}, remove:()=>{} } };
  if (e.key >= '0' && e.key <= '9') pressKey(e.key, dummy);
  else if (e.key === 'Backspace') pressKey('del', dummy);
  else if (e.key === 'ArrowRight' || e.key === 'Tab') { e.preventDefault(); moveBox(1); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); moveBox(-1); }
  else if (e.key === 'Enter') calculate();
});

function calculate() {
  let total = 0;
  for (let i = 0; i < NUM; i++) total += parseFloat(values[i]) || 0;

  let snack, theme, emoji;
  if (total < 1)        { snack = 'なし';               theme = 'theme-nashi';  emoji = '—'; }
  else if (total < 70)  { snack = 'あめ or ハイチュー'; theme = 'theme-ame';    emoji = '🍬'; }
  else if (total < 105) { snack = 'うまい棒';           theme = 'theme-umaibo'; emoji = '🌽'; }
  else                  { snack = 'ブタメン（しおきん）'; theme = 'theme-buta';  emoji = '🐷'; }

  const area = document.getElementById('resultArea');
  area.className = 'result-area';
  void area.offsetWidth;
  document.getElementById('rNum').textContent = Number.isInteger(total) ? total : total.toFixed(2);
  document.getElementById('rEmoji').textContent = emoji;
  document.getElementById('rSnack').textContent = snack;
  area.className = `result-area ${theme} show`;

  const rb = document.getElementById('btnReset');
  rb.style.display = 'block';
  rb.style.animation = 'none'; void rb.offsetWidth; rb.style.animation = '';

  area.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function resetAll() {
  for (let i = 0; i < NUM; i++) { values[i] = ''; renderBox(i); }
  document.getElementById('resultArea').className = 'result-area';
  document.getElementById('btnReset').style.display = 'none';
  setActive(0);
}
</script>
</body>
</html>
